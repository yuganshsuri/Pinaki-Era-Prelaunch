<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Launching Soon - Pinaki Era</title>
   <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       body {
           font-family: 'Outfit', sans-serif;
           background: linear-gradient(135deg, #ffcfcf 0%, #ffebeb 100%);
           min-height: 100vh;
           display: flex;
           align-items: center;
           justify-content: center;
           overflow-x: hidden;
           position: relative;
       }

       /* Decorative animated background circles */
       .circle {
           position: absolute;
           border-radius: 50%;
           background: rgba(255, 255, 255, 0.4);
           filter: blur(40px);
           z-index: 0;
           animation: float 8s infinite ease-in-out;
       }

       .circle-1 {
           width: 400px;
           height: 400px;
           top: -100px;
           left: -100px;
           animation-delay: 0s;
       }

       .circle-2 {
           width: 300px;
           height: 300px;
           bottom: -50px;
           right: -50px;
           animation-delay: -4s;
           background: rgba(255, 255, 255, 0.5);
       }

       @keyframes float {
           0%, 100% { transform: translate(0, 0); }
           50%       { transform: translate(30px, -30px); }
       }

       .card {
           background-color: #ffffff;
           border-radius: 24px;
           padding: 4rem 5rem;
           box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05), 0 0 0 10px rgba(255, 255, 255, 0.4);
           text-align: center;
           z-index: 1;
           display: flex;
           flex-direction: column;
           align-items: center;
           gap: 2rem;
           max-width: 90%;
           width: 600px;
           animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
           opacity: 0;
           transform: translateY(40px);
       }

       @keyframes slideUp {
           to {
               opacity: 1;
               transform: translateY(0);
           }
       }

       .logo-container {
           width: 180px;
           height: 180px;
           display: flex;
           align-items: center;
           justify-content: center;
           background-color: #fef8f8;
           border-radius: 50%;
           padding: 1rem;
           box-shadow: inset 0 5px 15px rgba(255, 207, 207, 0.5);
       }

       .logo {
           width: 100%;
           height: 100%;
           object-fit: contain;
           animation: pulse 3s infinite ease-in-out;
       }

       @keyframes pulse {
           0%   { transform: scale(0.95); }
           50%  { transform: scale(1.05); }
           100% { transform: scale(0.95); }
       }

       h1 {
           font-size: 3.5rem;
           font-weight: 600;
           color: #333333;
           letter-spacing: -1px;
           margin-bottom: 0.5rem;
           position: relative;
           display: inline-block;
       }

       h1 span {
           background: linear-gradient(90deg, #ff9a9a, #ffcfcf);
           -webkit-background-clip: text;
           -webkit-text-fill-color: transparent;
       }

       p {
           font-size: 1.25rem;
           color: #666666;
           font-weight: 300;
           line-height: 1.6;
       }

       .progress-bar {
           width: 100%;
           height: 6px;
           background-color: #f5f5f5;
           border-radius: 10px;
           overflow: hidden;
           margin-top: 1rem;
       }

       .progress-fill {
           height: 100%;
           width: 0%;
           background: linear-gradient(90deg, #ffcfcf, #ff9a9a);
           border-radius: 10px;
           animation: loadProgress 2s ease-out forwards;
       }

       @keyframes loadProgress {
           to { width: 75%; }
       }

       /* ── Contact Us section ─────────────────────── */
       .contact-section {
           display: flex;
           flex-direction: column;
           align-items: center;
           gap: 1rem;
           width: 100%;
           padding-top: 0.5rem;
           border-top: 1px solid #ffeaea;
       }

       .contact-label {
           font-size: 0.85rem;
           font-weight: 400;
           color: #bbaaaa;
           letter-spacing: 0.18em;
           text-transform: uppercase;
       }

       .contact-btn {
           display: inline-flex;
           align-items: center;
           gap: 0.5rem;
           padding: 0.85rem 2.5rem;
           background: linear-gradient(135deg, #ff9a9a, #ffcfcf);
           color: #fff;
           font-family: 'Outfit', sans-serif;
           font-size: 1rem;
           font-weight: 600;
           border: none;
           border-radius: 50px;
           cursor: pointer;
           box-shadow: 0 8px 24px rgba(255, 154, 154, 0.45);
           text-decoration: none;
           transition: transform 0.2s ease, box-shadow 0.2s ease;
       }

       .contact-btn:hover {
           transform: translateY(-3px);
           box-shadow: 0 14px 32px rgba(255, 154, 154, 0.55);
       }

       .contact-btn:active {
           transform: translateY(0);
       }

       @media (max-width: 768px) {
           .card {
               padding: 3rem 2rem;
           }
           h1 {
               font-size: 2.5rem;
           }
           .logo-container {
               width: 140px;
               height: 140px;
           }
       }
   </style>
</head>

<body>
   <div class="circle circle-1"></div>
   <div class="circle circle-2"></div>

   <div class="card">
       <div class="logo-container">
           <img src="mainlogo.png" alt="Pinaki Era Logo" class="logo">
       </div>

       <div>
           <h1>Launching <span>Soon</span></h1>
           <p>We are meticulously crafting something beautifully unique. Our new experience will be ready shortly.</p>
       </div>

       <div class="progress-bar">
           <div class="progress-fill"></div>
       </div>

       <!-- Contact Us Section -->
       <div class="contact-section">
           <span class="contact-label">Contact Us</span>
           <a href="contact.html" class="contact-btn" id="contact-us-btn">
               ✉&nbsp; Get In Touch
           </a>
       </div>
   </div>
</body>

</html>
